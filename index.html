<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carte territoire</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- TON FICHIER -->
<script src="BASSIN_VERSANT_TOPOGRAPHIQUE_7.js"></script>

<script>
  var map = L.map('map').setView([46.5, 2.5], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Ajout de la couche (à adapter selon ton fichier)
  if (typeof json_BASSIN_VERSANT_TOPOGRAPHIQUE_7 !== 'undefined') {
    L.geoJSON(json_BASSIN_VERSANT_TOPOGRAPHIQUE_7).addTo(map);
  }
</script>

</body>
</html>
